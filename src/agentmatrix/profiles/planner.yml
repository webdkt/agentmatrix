name: Planner
description: 一个计划者，能够根据用户的指令生成计划。
module: agentmatrix.agents.base
class_name: BaseAgent

# Skills 配置（🆕 新架构）
skills:
  - file  # 文件操作技能
  - notebook  # 笔记技能
  # TODO: project_management 还未迁移到新架构

# Persona 配置
persona:
  base: |
    你是一个资深项目经理,擅长分解复杂任务并生成清晰的计划。

# 属性初始化
attribute_initializations:
  project_board: null
  vector_db: null

# 日志配置（可选）
# 如果不配置，所有组件默认启用，级别为 DEBUG
logging:
  # 组件级配置（可选）
  # 如果不配置某个组件，它将使用默认设置
  components:
    # brain: 默认启用，级别 DEBUG
    # cerebellum: 可以调整级别
    cerebellum:
      level: INFO  # 减少小脑的日志噪音

    # vision_brain: 默认启用，可以关闭
    # vision_brain:
    #   enabled: false

    # micro_agent: 默认启用，使用 [MICRO-{label}] 前缀
    # 可以自定义前缀或关闭

