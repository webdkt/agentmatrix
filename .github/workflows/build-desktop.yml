name: Build Desktop App

on:
  push:
    branches: [main, feature/*]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  # Job 1: Build Docker image
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t agentmatrix:latest .

      - name: Export Docker image
        run: |
          mkdir -p artifacts
          docker save agentmatrix:latest | gzip > artifacts/docker-image-x86_64.tar.gz
          ls -lh artifacts/docker-image-x86_64.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-x86_64
          path: artifacts/docker-image-x86_64.tar.gz
          retention-days: 7
          compression-level: 6

  # Job 2: Build macOS ARM
  build-macos-arm:
    needs: build-docker
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        run: |
          ls -la dist-server/server/server

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-x86_64
          path: artifacts

      - name: Copy Docker image to resources
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-x86_64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (macOS)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/Podman.dmg \
            "https://github.com/containers/podman-desktop/releases/latest/download/podman-desktop-latest-mac.dmg"

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          cp dist-server/server/server agentmatrix-desktop/src-tauri/binaries/server-aarch64-apple-darwin
          chmod +x agentmatrix-desktop/src-tauri/binaries/server-aarch64-apple-darwin

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        run: find . -name ".DS_Store" -delete

      - name: Build Tauri application
        working-directory: agentmatrix-desktop
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin-build
          path: |
            agentmatrix-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # Job 3: Build macOS x64
  build-macos-x64:
    needs: build-docker
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        run: |
          ls -la dist-server/server/server

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-x86_64
          path: artifacts

      - name: Copy Docker image to resources
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-x86_64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (macOS)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/Podman.dmg \
            "https://github.com/containers/podman-desktop/releases/latest/download/podman-desktop-latest-mac.dmg"

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          cp dist-server/server/server agentmatrix-desktop/src-tauri/binaries/server-x86_64-apple-darwin
          chmod +x agentmatrix-desktop/src-tauri/binaries/server-x86_64-apple-darwin

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        run: find . -name ".DS_Store" -delete

      - name: Build Tauri application
        working-directory: agentmatrix-desktop
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-apple-darwin-build
          path: |
            agentmatrix-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # Job 4: Build Windows
  build-windows:
    needs: build-docker
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        shell: bash
        run: |
          ls -la dist-server/server/server.exe

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image-x86_64
          path: artifacts

      - name: Copy Docker image to resources
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-x86_64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (Windows)
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/podman.msi \
            "https://github.com/containers/podman/releases/latest/download/podman-setup-x64.msi"

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          cp dist-server/server/server.exe agentmatrix-desktop/src-tauri/binaries/server-x86_64-pc-windows-msvc.exe

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        shell: bash
        run: find . -name ".DS_Store" -delete 2>/dev/null || true

      - name: Build Tauri application
        working-directory: agentmatrix-desktop
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-msvc-build
          path: |
            agentmatrix-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 7

  # Job 5: Release (only on tag push)
  release:
    needs: [build-macos-arm, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions: 
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.dmg,artifacts/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
