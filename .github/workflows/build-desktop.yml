name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  PYTHON_STANDALONE_VERSION: '3.12.13+20260602'
  PYTHON_STANDALONE_RELEASE: '20260602'

jobs:
  # Job 1: Build macOS ARM64
  build-macos-arm64:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python backend with PyInstaller (onedir mode)
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify Python distribution
        run: |
          echo "=== Python distribution structure ==="
          ls -la dist-server/server/
          echo "=== Executable file ==="
          file dist-server/server/server
          ls -lh dist-server/server/server
          echo "=== _internal folder ==="
          ls -la dist-server/server/_internal/ | head -20

      # ==================== Copy Python Distribution to Tauri Resources ====================
      - name: Copy Python distribution to resources (onedir mode)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources
          echo "Copying dist-server/server → resources/python_dist"
          cp -r dist-server/server agentmatrix-desktop/src-tauri/resources/python_dist
          echo "=== Verification ==="
          ls -lh agentmatrix-desktop/src-tauri/resources/python_dist/server
          du -sh agentmatrix-desktop/src-tauri/resources/python_dist

      # ==================== Bundle Standalone Python for venv creation ====================
      - name: Download standalone Python 3.12
        run: |
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PYTHON_STANDALONE_RELEASE }}/cpython-${{ env.PYTHON_STANDALONE_VERSION }}-aarch64-apple-darwin-install_only_stripped.tar.gz"
          echo "Downloading: $PYTHON_URL"
          curl -L -o /tmp/python-standalone.tar.gz "$PYTHON_URL"
          mkdir -p /tmp/python-standalone
          tar xzf /tmp/python-standalone.tar.gz -C /tmp/python-standalone
          # Copy the install directory to resources
          cp -r /tmp/python-standalone/python/install agentmatrix-desktop/src-tauri/resources/python_standalone
          echo "=== Standalone Python ==="
          ls -lh agentmatrix-desktop/src-tauri/resources/python_standalone/bin/python3
          du -sh agentmatrix-desktop/src-tauri/resources/python_standalone

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        run: find . -name ".DS_Store" -delete

      - name: Build Tauri application (ARM64)
        working-directory: agentmatrix-desktop
        run: npm run tauri:build -- --target aarch64-apple-darwin
        env:
          CI: true
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin-build
          path: |
            agentmatrix-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # Job 2: Build Windows
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python backend with PyInstaller (onedir mode)
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify Python distribution
        shell: bash
        run: |
          echo "=== Python distribution structure ==="
          ls -la dist-server/server/
          echo "=== Executable file ==="
          ls -lh dist-server/server/server.exe
          echo "=== _internal folder ==="
          ls -la dist-server/server/_internal/ | head -20

      # ==================== Copy Python Distribution to Tauri Resources ====================
      - name: Copy Python distribution to resources (onedir mode)
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources
          echo "Copying dist-server/server → resources/python_dist"
          cp -r dist-server/server agentmatrix-desktop/src-tauri/resources/python_dist
          echo "=== Verification ==="
          ls -lh agentmatrix-desktop/src-tauri/resources/python_dist/server.exe
          du -sh agentmatrix-desktop/src-tauri/resources/python_dist

      # ==================== Bundle Standalone Python for venv creation ====================
      - name: Download standalone Python 3.12
        shell: bash
        run: |
          PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PYTHON_STANDALONE_RELEASE }}/cpython-${{ env.PYTHON_STANDALONE_VERSION }}-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
          echo "Downloading: $PYTHON_URL"
          curl -L -o /tmp/python-standalone.tar.gz "$PYTHON_URL"
          mkdir -p /tmp/python-standalone
          tar xzf /tmp/python-standalone.tar.gz -C /tmp/python-standalone
          # Copy the install directory to resources
          cp -r /tmp/python-standalone/python/install agentmatrix-desktop/src-tauri/resources/python_standalone
          echo "=== Standalone Python ==="
          ls -lh agentmatrix-desktop/src-tauri/resources/python_standalone/python.exe
          du -sh agentmatrix-desktop/src-tauri/resources/python_standalone

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        shell: bash
        run: find . -name ".DS_Store" -delete 2>/dev/null || true

      - name: Build Tauri application
        working-directory: agentmatrix-desktop
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-msvc-build
          path: |
            agentmatrix-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 7

  # Job 3: Release (only on tag push)
  release:
    needs: [build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.dmg,artifacts/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
