name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  # Job 1: Build multi-architecture Docker image
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-architecture Docker image
        run: |
          # Create builder instance with multi-arch support
          docker buildx create --use --name multiarch-builder

          # Build for both amd64 and arm64, but don't push (we'll export locally)
          # Using --platform to specify multiple architectures
          # Using --load to load the result (but this only works for single platform)
          # Instead, we'll build each separately and export both

          # Build and export linux/amd64
          docker buildx build \
            --platform linux/amd64 \
            --output type=docker,dest=artifacts/docker-image-amd64.tar \
            --tag agentmatrix:amd64 \
            .

          # Build and export linux/arm64
          docker buildx build \
            --platform linux/arm64 \
            --output type=docker,dest=artifacts/docker-image-arm64.tar \
            --tag agentmatrix:arm64 \
            .

          # Compress both images
          gzip -f artifacts/docker-image-amd64.tar
          gzip -f artifacts/docker-image-arm64.tar

          # Verify sizes
          ls -lh artifacts/

      - name: Upload Docker image artifacts (both architectures)
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-multiarch
          path: |
            artifacts/docker-image-amd64.tar.gz
            artifacts/docker-image-arm64.tar.gz
          retention-days: 7
          compression-level: 6

  # Job 2: Build macOS ARM64
  build-macos-arm64:
    needs: build-docker
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        run: |
          file dist-server/server
          ls -la dist-server/server

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-images-multiarch
          path: artifacts

      - name: Copy Docker image to resources (ARM64)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-arm64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (macOS ARM64)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/containers/podman/releases/latest)
          PACKAGE_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name == "podman-installer-macos-arm64.pkg") | .browser_download_url')
          echo "Downloading from: $PACKAGE_URL"
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/podman-installer-arm64.pkg "$PACKAGE_URL"
          ls -lh agentmatrix-desktop/src-tauri/resources/podman/podman-installer-arm64.pkg

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          # Copy as 'server' (Tauri will auto-append target triple)
          cp dist-server/server agentmatrix-desktop/src-tauri/binaries/server
          chmod +x agentmatrix-desktop/src-tauri/binaries/server
          ls -lh agentmatrix-desktop/src-tauri/binaries/

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        run: find . -name ".DS_Store" -delete

      - name: Build Tauri application (ARM64)
        working-directory: agentmatrix-desktop
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          CI: true
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin-build
          path: |
            agentmatrix-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # Job 3: Build macOS x86_64
  build-macos-x64:
    needs: build-docker
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        run: |
          file dist-server/server
          ls -la dist-server/server

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-images-multiarch
          path: artifacts

      - name: Copy Docker image to resources (x86_64)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-amd64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (macOS x64)
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/containers/podman/releases/latest)
          PACKAGE_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name == "podman-installer-macos-amd64.pkg") | .browser_download_url')
          echo "Downloading from: $PACKAGE_URL"
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/podman-installer-x64.pkg "$PACKAGE_URL"
          ls -lh agentmatrix-desktop/src-tauri/resources/podman/podman-installer-x64.pkg

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          # Copy as 'server' (Tauri will auto-append target triple)
          cp dist-server/server agentmatrix-desktop/src-tauri/binaries/server
          chmod +x agentmatrix-desktop/src-tauri/binaries/server
          ls -lh agentmatrix-desktop/src-tauri/binaries/

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        run: find . -name ".DS_Store" -delete

      - name: Build Tauri application (x86_64)
        working-directory: agentmatrix-desktop
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          CI: true
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-apple-darwin-build
          path: |
            agentmatrix-desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # Job 4: Build Windows
  build-windows:
    needs: build-docker
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Python Backend Build ====================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller server.spec --distpath dist-server

      - name: Verify server executable
        shell: bash
        run: |
          ls -la dist-server/server.exe

      # ==================== Download Docker Image ====================
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-images-multiarch
          path: artifacts

      - name: Copy Docker image to resources (x86_64)
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/docker
          cp artifacts/docker-image-amd64.tar.gz agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz
          ls -lh agentmatrix-desktop/src-tauri/resources/docker/image.tar.gz

      # ==================== Download Podman Installer ====================
      - name: Download Podman installer (Windows)
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/resources/podman
          RELEASE_INFO=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/containers/podman/releases/latest)
          PACKAGE_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name == "podman-installer-windows-amd64.msi") | .browser_download_url')
          echo "Downloading from: $PACKAGE_URL"
          curl -L -o agentmatrix-desktop/src-tauri/resources/podman/podman-x64.msi "$PACKAGE_URL"
          ls -lh agentmatrix-desktop/src-tauri/resources/podman/podman-x64.msi

      # ==================== Copy Server to Tauri Sidecar ====================
      - name: Copy server to sidecar directory
        shell: bash
        run: |
          mkdir -p agentmatrix-desktop/src-tauri/binaries
          # Copy as 'server.exe' (Tauri will auto-append target triple)
          cp dist-server/server.exe agentmatrix-desktop/src-tauri/binaries/server.exe
          ls -lh agentmatrix-desktop/src-tauri/binaries/

      # ==================== Frontend Build ====================
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'agentmatrix-desktop/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: agentmatrix-desktop
        run: npm install

      # ==================== Tauri Build ====================
      - name: Clean .DS_Store files
        shell: bash
        run: find . -name ".DS_Store" -delete 2>/dev/null || true

      - name: Build Tauri application
        working-directory: agentmatrix-desktop
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # ==================== Upload Artifacts ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-msvc-build
          path: |
            agentmatrix-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 7

  # Job 5: Release (only on tag push)
  release:
    needs: [build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.dmg,artifacts/**/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
