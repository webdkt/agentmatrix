<!-- AskUserDialog Component - 模态版本 -->
<template id="ask-user-dialog-modal-template">
    <div x-show="hasAskUserDialog()"
         class="fixed inset-0 z-50 flex items-center justify-center"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <!-- Overlay -->
        <div class="absolute inset-0 bg-surface-900/40 backdrop-blur-sm" @click="closeAskUserDialog(currentSession?.session_id)"></div>

        <!-- Dialog Content -->
        <div class="relative bg-white rounded-2xl shadow-elevated w-full max-w-lg mx-4 overflow-hidden animate-scale-in">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-surface-100 flex items-center justify-between bg-gradient-to-r from-accent-50/50 to-white">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-accent-100 flex items-center justify-center">
                        <i class="ti ti-message-circle text-accent-600 text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-lg font-semibold text-surface-900">Agent 需要您的输入</h2>
                        <p class="text-xs text-surface-500">
                            <span x-text="getCurrentAskUserDialog()?.agent_name"></span> 有问题需要您回答
                        </p>
                    </div>
                </div>
                <button @click="closeAskUserDialog(currentSession?.session_id)" class="w-8 h-8 rounded-lg text-surface-400 hover:text-surface-600 hover:bg-surface-100 flex items-center justify-center transition-all duration-200 btn-press">
                    <i class="ti ti-x text-xl"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Question -->
                <div class="mb-4 p-4 bg-surface-50 rounded-xl border border-surface-200">
                    <p class="text-sm text-surface-500 mb-1">问题：</p>
                    <p class="text-surface-900" x-text="getCurrentAskUserDialog()?.question"></p>
                </div>

                <!-- Answer Input -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-surface-700 mb-2">
                        您的回答 <span class="text-rose-500">*</span>
                    </label>
                    <textarea x-model="getAskUserAnswer()" x-on:input="setAskUserAnswer($event.target.value)"
                              rows="4"
                              placeholder="请输入您的回答..."
                              class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-surface-700 placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-accent-500/20 focus:border-accent-300 transition-all duration-200 resize-none"
                              :class="{ 'border-rose-300': getCurrentAskUserDialog()?.error }"
                              @keydown.enter.prevent="submitUserAnswer(currentSession?.session_id)"></textarea>
                    <p x-show="getCurrentAskUserDialog()?.error" class="mt-1 text-xs text-rose-500" x-text="getCurrentAskUserDialog()?.error"></p>
                </div>

                <!-- Info -->
                <div class="flex items-start gap-2 p-3 bg-blue-50 border border-blue-200 rounded-xl">
                    <i class="ti ti-info-circle text-blue-600 text-lg mt-0.5"></i>
                    <p class="text-xs text-blue-700">
                        您的回答将发送给 <span class="font-medium" x-text="getCurrentAskUserDialog()?.agent_name"></span>，
                        Agent 将继续执行任务。
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-6 py-4 border-t border-surface-100 flex justify-end gap-3 bg-surface-50/50">
                <button @click="closeAskUserDialog(currentSession?.session_id)"
                        class="px-5 py-2.5 border border-surface-200 rounded-xl text-surface-700 font-medium hover:bg-surface-100 transition-all duration-200 btn-press">
                    最小化
                </button>
                <button @click="submitUserAnswer(currentSession?.session_id)"
                        :disabled="getCurrentAskUserDialog()?.submitting"
                        class="px-6 py-2.5 bg-accent-600 text-white rounded-xl font-medium hover:bg-accent-700 transition-all duration-200 btn-press shadow-glow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <span x-show="!getCurrentAskUserDialog()?.submitting">提交回答</span>
                    <span x-show="getCurrentAskUserDialog()?.submitting">提交中...</span>
                    <i x-show="getCurrentAskUserDialog()?.submitting" class="ti ti-loader-2 animate-spin"></i>
                </button>
            </div>
        </div>
    </div>
</template>

<!-- AskUserDialog Component - 内联版本（嵌入在会话中） -->
<template id="ask-user-dialog-inline-template">
    <div x-show="hasAskUserDialog()"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-4"
         class="mb-6 ml-14">
        <div class="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4 shadow-card">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
                    <i class="ti ti-bell-ringing text-amber-600 text-lg"></i>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-2">
                        <p class="text-sm font-semibold text-surface-900">
                            <span x-text="getCurrentAskUserDialog()?.agent_name"></span> 等待你的回答
                        </p>
                        <span class="px-2 py-0.5 bg-amber-200 text-amber-700 text-xs font-medium rounded-full">待回答</span>
                    </div>

                    <!-- 问题 -->
                    <div class="mb-3 p-3 bg-white rounded-lg border border-amber-200">
                        <p class="text-xs text-amber-600 mb-1">问题：</p>
                        <p class="text-sm text-surface-800" x-text="getCurrentAskUserDialog()?.question"></p>
                    </div>

                    <!-- 回答输入区 -->
                    <div class="flex gap-2">
                        <textarea x-model="getAskUserAnswer()" x-on:input="setAskUserAnswer($event.target.value)"
                                  rows="2"
                                  placeholder="输入你的回答...（留空将发送 "OK"）"
                                  class="flex-1 px-3 py-2 bg-white border border-amber-200 rounded-lg text-sm text-surface-700 placeholder-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-300 transition-all duration-200 resize-none"
                                  @keydown.enter.prevent="submitUserAnswer(currentSession?.session_id)"></textarea>
                        <button @click="submitUserAnswer(currentSession?.session_id)"
                                :disabled="getCurrentAskUserDialog()?.submitting"
                                class="px-4 py-2 bg-amber-600 text-white rounded-lg text-sm font-medium hover:bg-amber-700 transition-all duration-200 btn-press shadow-glow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                            <span x-show="!getCurrentAskUserDialog()?.submitting">发送</span>
                            <span x-show="getCurrentAskUserDialog()?.submitting">发送中...</span>
                            <i x-show="getCurrentAskUserDialog()?.submitting" class="ti ti-loader-2 animate-spin"></i>
                        </button>
                    </div>

                    <p class="mt-2 text-xs text-amber-600">
                        <i class="ti ti-info-circle"></i>
                        提示：Agent 正在等待你的回答才能继续执行
                    </p>
                </div>
            </div>
        </div>
    </div>
</template>
