<!-- ConversationList Component - 会话列表 -->
<template id="conversation-list-template">
                    <!-- CONVERSATION LIST PANEL -->
                    <aside class="w-[320px] bg-white border-r border-surface-200/60 flex flex-col flex-shrink-0">
                        <!-- Panel Header -->
                        <div class="px-5 py-4 border-b border-surface-100">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-semibold text-surface-900 tracking-tight">Conversations</h2>
                                <button @click="showNewEmailModal = true"
                                        class="w-9 h-9 rounded-xl bg-primary-50 text-primary-600 hover:bg-primary-100 flex items-center justify-center transition-all duration-200 btn-press shadow-soft">
                                    <i class="ti ti-plus text-lg"></i>
                                </button>
                            </div>
                            <!-- Search -->
                            <div class="relative">
                                <i class="ti ti-search absolute left-3 top-1/2 -translate-y-1/2 text-surface-400"></i>
                                <input type="text" placeholder="Search conversations..."
                                       class="w-full pl-10 pr-4 py-2.5 bg-surface-50 border border-surface-200 rounded-xl text-sm text-surface-700 placeholder-surface-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-300 transition-all duration-200">
                            </div>
                        </div>

                        <!-- Session List -->
                        <div class="flex-1 overflow-y-auto p-3 space-y-1">
                            <template x-for="(session, index) in sessions" :key="session.session_id">
                                <div @click="selectSession(session)"
                                     :class="currentSession?.session_id === session.session_id ? 'bg-primary-50/70 border-primary-200' : 'border-transparent hover:bg-surface-50 hover:border-surface-200'"
                                     class="session-item">
                                    <div class="flex items-center gap-3">
                                        <!-- Avatar with gradient based on index -->
                                        <div :class="{
                                            'from-blue-400 to-blue-600': index % 5 === 0,
                                            'from-emerald-400 to-emerald-600': index % 5 === 1,
                                            'from-violet-400 to-violet-600': index % 5 === 2,
                                            'from-amber-400 to-orange-500': index % 5 === 3,
                                            'from-rose-400 to-pink-600': index % 5 === 4,
                                        }"
                                             class="w-11 h-11 rounded-full bg-gradient-to-br flex items-center justify-center text-white font-semibold shadow-card flex-shrink-0">
                                            <span x-text="session.subject.charAt(0).toUpperCase()"></span>
                                        </div>
                                        <div class="flex-1 min-w-0">
                                            <!-- Agent Names (top, bold, prominent) -->
                                            <div class="flex items-center justify-between">
                                                <div class="flex items-center gap-2 flex-1 min-w-0">
                                                    <span class="font-bold text-black text-base truncate" x-text="session.participants && session.participants.length > 0 ? session.participants.join(', ') : 'New Chat'"></span>
                                                    <!-- 🔔 待回答标志 -->
                                                    <span x-show="askUserDialogs[session.session_id]?.show"
                                                          class="px-2 py-0.5 bg-amber-100 text-amber-700 text-xs font-medium rounded-full flex items-center gap-1 flex-shrink-0">
                                                        <i class="ti ti-bell-ringing text-xs"></i>
                                                        待回答
                                                    </span>
                                                </div>
                                                <span class="text-xs text-surface-400 flex-shrink-0" x-text="formatDate(session.last_email_time)"></span>
                                            </div>
                                            <!-- Subject (bottom, regular, prevents overflow) -->
                                            <p class="text-sm text-surface-600 truncate mt-1" x-text="session.subject || 'No Subject'"></p>
                                            <!-- 🆕 Agent 状态徽章 -->
                                            <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                                                <template x-for="agentName in (session.participants || [])" :key="agentName">
                                                    <div class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium"
                                                         :class="{
                                                            'bg-surface-100 text-surface-600': getAgentStatusDisplay(agentName, session.session_id).status === 'idle',
                                                            'bg-blue-50 text-blue-700': getAgentStatusDisplay(agentName, session.session_id).status === 'thinking',
                                                            'bg-amber-50 text-amber-700': getAgentStatusDisplay(agentName, session.session_id).status === 'working',
                                                            'bg-pink-50 text-pink-700': getAgentStatusDisplay(agentName, session.session_id).status === 'waiting_for_user',
                                                            'bg-surface-50 text-surface-400 italic': getAgentStatusDisplay(agentName, session.session_id).status === 'busy-on-other',
                                                            'bg-gray-50 text-gray-400': getAgentStatusDisplay(agentName, session.session_id).status === 'unknown'
                                                         }">
                                                        <span x-text="agentName"></span>
                                                        <span x-text="getAgentStatusDisplay(agentName, session.session_id).text"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <!-- Empty State for Sessions -->

                            <!-- Load More Button -->
                            <div x-show="hasMoreConversations" class="p-3">
                                <button @click="loadSessions(true)"
                                        class="w-full py-2.5 px-4 bg-surface-100 hover:bg-surface-200 text-surface-700 rounded-xl text-sm font-medium transition-colors duration-200 flex items-center justify-center gap-2">
                                    <i class="ti ti-loader"></i>
                                    Load More Conversations
                                </button>
                            </div>

                            <div x-show="sessions.length === 0" class="p-8 text-center">
                                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-surface-100 flex items-center justify-center">
                                    <i class="ti ti-messages text-3xl text-surface-300"></i>
                                </div>
                                <p class="text-surface-500 text-sm">No conversations yet</p>
                                <p class="text-surface-400 text-xs mt-1">Start a new conversation to begin</p>
                            </div>
                        </div>
                    </aside>
</template>
