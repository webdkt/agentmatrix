<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: #FDFCF9;
      color: #1A1A1A;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .title {
      font-family: "Source Serif 4", "Noto Serif SC", "Songti SC", Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: #1A1A1A;
      letter-spacing: 0.02em;
    }

    /* 震荡进度条 */
    .thinking-bar {
      width: 120px;
      height: 2px;
      background: #EDE9E1;
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    .thinking-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      background: #C23B22;
      border-radius: 1px;
      animation: oscillate 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes oscillate {
      0%   { left: -40%; }
      50%  { left: 100%; }
      100% { left: -40%; }
    }

    /* 进度文字 */
    .status {
      font-size: 13px;
      color: #666;
      text-align: center;
      min-height: 20px;
      max-width: 300px;
      line-height: 1.5;
    }

    .status .percent {
      font-weight: 600;
      color: #1A1A1A;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="title">AgentMatrix</div>
  <div class="thinking-bar"></div>
  <div class="status" id="status">正在启动...</div>

  <script>
    console.log('🔍 Splash screen loaded');

    // 监听来自 Tauri 的安装进度事件
    if (window.__TAURI__) {
      console.log('✅ Tauri API available');

      window.__TAURI__.event.listen('installation-progress', (event) => {
        console.log('📊 Received installation-progress event:', event.payload);
        const progress = event.payload;

        // 更新进度文字
        updateStatus(progress);
      });

      console.log('✅ Event listener registered');
    } else {
      console.warn('⚠️ Tauri API not available');
    }

    /**
     * 更新进度文字显示
     * @param {Object} progress - 进度对象 {stage, percent, message}
     */
    function updateStatus(progress) {
      const statusEl = document.getElementById('status');
      const { stage, percent, message } = progress;

      // 完成状态
      if (stage === 'complete') {
        statusEl.innerHTML = '✅ 初始化完成，正在启动...';
        setTimeout(() => {
          statusEl.innerHTML = '启动后端服务...';
        }, 2000);
        return;
      }

      // 构建显示文字
      let text = '';
      if (percent > 0) {
        text += `<span class="percent">${percent}%</span>`;
      }
      if (message) {
        text += message;
      }

      statusEl.innerHTML = text;
    }
  </script>
</body>
</html>
