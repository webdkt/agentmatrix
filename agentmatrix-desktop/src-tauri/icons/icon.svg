<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>

  <!-- Robot icon -->
  <g fill="white">
    <!-- Head -->
    <rect x="30" y="30" width="40" height="30" rx="5" ry="5"/>

    <!-- Eyes -->
    <circle cx="40" cy="40" r="5"/>
    <circle cx="60" cy="40" r="5"/>

    <!-- Mouth -->
    <rect x="40" y="50" width="20" height="3" rx="1.5"/>

    <!-- Antenna -->
    <line x1="50" y1="30" x2="50" y2="20" stroke="white" stroke-width="3"/>
    <circle cx="50" cy="17" r="4"/>

    <!-- Body -->
    <rect x="35" y="62" width="30" height="20" rx="3"/>

    <!-- Arms -->
    <rect x="25" y="65" width="8" height="15" rx="2"/>
    <rect x="67" y="65" width="8" height="15" rx="2"/>
  </g>
</svg>
