<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: #FDFCF9;
      color: #1A1A1A;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .title {
      font-family: "Source Serif 4", "Noto Serif SC", "Songti SC", Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: #1A1A1A;
      letter-spacing: 0.02em;
    }

    .label {
      font-size: 12px;
      color: #8A8A8A;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-variant: small-caps;
      margin-top: 10px;
    }

    /* Thinking bar — vermillion 2px progress bar, oscillating */
    .thinking-bar {
      width: 120px;
      height: 2px;
      background: #EDE9E1;
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    .thinking-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      background: #C23B22;
      border-radius: 1px;
      animation: oscillate 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes oscillate {
      0%   { left: -40%; }
      50%  { left: 100%; }
      100% { left: -40%; }
    }

    /* ═══════════════════════════════════════════════════════════
       安装进度区域（默认隐藏，安装时显示）
       ═══════════════════════════════════════════════════════════ */

    .installation-progress {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: none;  /* 默认隐藏 */
    }

    .progress-stage {
      margin-bottom: 12px;
    }

    .stage-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stage-name {
      font-weight: 500;
    }

    .stage-status {
      font-size: 12px;
      color: #8A8A8A;
    }

    .stage-bar-bg {
      width: 100%;
      height: 4px;
      background: #EDE9E1;
      border-radius: 2px;
      overflow: hidden;
    }

    .stage-bar-fill {
      height: 100%;
      background: #C23B22;
      transition: width 0.3s ease, background-color 0.3s ease;
      width: 0%;
    }

    /* 进度条状态颜色 */
    .stage-bar-fill.complete {
      background: #4CAF50;
    }

    .stage-bar-fill.skipped {
      background: #FFA726;
    }

    .stage-bar-fill.failed {
      background: #F44336;
    }

    /* ═══════════════════════════════════════════════════════════
       完成提示
       ═══════════════════════════════════════════════════════════ */

    .complete-message {
      text-align: center;
      padding: 20px;
      display: none;
    }

    .complete-message .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .complete-message .text {
      font-size: 14px;
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="title">AgentMatrix</div>

  <!-- 简单启动提示（默认显示） -->
  <div id="simple-progress" class="thinking-bar">
    <div class="thinking-bar::after"></div>
  </div>

  <!-- 安装进度区域（安装时显示） -->
  <div id="installation-progress" class="installation-progress">
    <div class="progress-stage" id="stage-core">
      <div class="stage-label">
        <span class="stage-name">核心组件 (PDF 处理等)</span>
        <span class="stage-status" id="stage-core-status">等待中</span>
      </div>
      <div class="stage-bar-bg">
        <div class="stage-bar-fill" id="stage-core-bar"></div>
      </div>
    </div>

    <div class="progress-stage" id="stage-libreoffice">
      <div class="stage-label">
        <span class="stage-name">LibreOffice (Office 文档)</span>
        <span class="stage-status" id="stage-libreoffice-status">等待中</span>
      </div>
      <div class="stage-bar-bg">
        <div class="stage-bar-fill" id="stage-libreoffice-bar"></div>
      </div>
    </div>

    <div class="progress-stage" id="stage-browsers">
      <div class="stage-label">
        <span class="stage-name">Playwright 浏览器</span>
        <span class="stage-status" id="stage-browsers-status">等待中</span>
      </div>
      <div class="stage-bar-bg">
        <div class="stage-bar-fill" id="stage-browsers-bar"></div>
      </div>
    </div>

    <div class="progress-stage" id="stage-npm">
      <div class="stage-label">
        <span class="stage-name">NPM 全局包</span>
        <span class="stage-status" id="stage-npm-status">等待中</span>
      </div>
      <div class="stage-bar-bg">
        <div class="stage-bar-fill" id="stage-npm-bar"></div>
      </div>
    </div>
  </div>

  <!-- 完成提示 -->
  <div id="complete-message" class="complete-message">
    <div class="icon">✅</div>
    <div class="text">初始化完成，正在启动...</div>
  </div>

  <div class="label" id="status-label">正在启动...</div>

  <script>
    console.log('🔍 Splash screen loaded');

    // 监听来自 Tauri 的安装进度事件
    if (window.__TAURI__) {
      console.log('✅ Tauri API available');

      window.__TAURI__.event.listen('installation-progress', (event) => {
        console.log('📊 Received installation-progress event:', event.payload);
        const progress = event.payload;

        // 显示安装进度区域
        document.getElementById('installation-progress').style.display = 'block';
        document.getElementById('simple-progress').style.display = 'none';

        // 更新对应阶段的进度
        if (progress.stage) {
          updateStage(progress.stage, progress.percent, progress.message);
        }

        // 更新状态标签
        if (progress.message) {
          document.getElementById('status-label').textContent = progress.message;
        }

        // 完成后显示完成消息并切换回简单进度条
        if (progress.stage === 'complete') {
          setTimeout(() => {
            document.getElementById('installation-progress').style.display = 'none';
            document.getElementById('complete-message').style.display = 'block';
            document.getElementById('status-label').textContent = '初始化完成';

            // 2秒后切换到启动后端的提示
            setTimeout(() => {
              document.getElementById('complete-message').style.display = 'none';
              document.getElementById('simple-progress').style.display = 'block';
              document.getElementById('status-label').textContent = '启动后端服务...';
            }, 2000);
          }, 1500);
        }
      });

      console.log('✅ Event listener registered');
    } else {
      console.warn('⚠️ Tauri API not available');
    }

    /**
     * 更新指定阶段的进度条
     * @param {string} stageId - 阶段ID (core, libreoffice, browsers, npm)
     * @param {number} percent - 进度百分比 (0-100)
     * @param {string} message - 状态消息
     */
    function updateStage(stageId, percent, message) {
      const bar = document.getElementById(`stage-${stageId}-bar`);
      const status = document.getElementById(`stage-${stageId}-status`);

      if (!bar || !status) return;

      // 更新进度条宽度
      bar.style.width = `${percent}%`;

      // 根据状态更新样式和文本
      if (percent === 100) {
        status.textContent = '完成';
        bar.className = 'stage-bar-fill complete';
      } else if (percent === 0 && message && message.includes('跳过')) {
        status.textContent = '已跳过';
        bar.className = 'stage-bar-fill skipped';
        bar.style.width = '100%';  // 跳过的也显示满条
      } else if (percent === 0 && message && message.includes('失败')) {
        status.textContent = '失败，已跳过';
        bar.className = 'stage-bar-fill failed';
      } else if (percent > 0) {
        status.textContent = `${percent}%`;
        bar.className = 'stage-bar-fill';
      } else {
        status.textContent = '等待中';
      }
    }
  </script>
</body>
</html>
